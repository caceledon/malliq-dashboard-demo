services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: malliq-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./data:/app/server/data
    expose:
      - "4000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
