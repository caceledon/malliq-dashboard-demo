services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: malliq
      POSTGRES_USER: malliq_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-malliq_local}
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB"]
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malliq_admin -d malliq"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: malliq
      DB_USER: malliq_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-malliq_local}
      ALLOWED_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"

volumes:
  pg_data:
